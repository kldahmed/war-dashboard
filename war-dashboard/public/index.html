<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#080808" />
    <meta name="description" content="داشبورد أخبار المنطقة - إيران الخليج أمريكا إسرائيل" />
    <!-- Prevent IE/Edge from switching to compatibility mode -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- Referrer policy for privacy -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- Prevent browser from guessing MIME types -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <title>داشبورد أخبار المنطقة</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #080808; }
      /* Avoid flash of unstyled content */
      #root:empty { min-height: 100vh; background: #080808; }
    </style>
  </head>
  <body>
    <noscript>يجب تفعيل JavaScript لتشغيل هذا التطبيق.</noscript>
    <div id="root"></div>
  </body>
</html>
